<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Yapilacaklar Listesi</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Yeni gorev ekle..." autofocus>
            <button id="addBtn">Ekle</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tumu</button>
            <button class="filter-btn" data-filter="active">Aktif</button>
            <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        </div>
        <ul id="taskList"></ul>
        <div class="footer">
            <span id="taskCount">0 gorev kaldi</span>
            <button id="clearCompleted">Tamamlananlari Temizle</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
